<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Plant Simulator</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  font-size: 14px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== TOPBAR ===== */
#topbar {
  flex: 0 0 auto;
  background: #1e293b;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#titleBox {
  display: flex;
  align-items: center;
  gap: 10px;
}

#title {
  font-size: 20px;
  font-weight: 900;
}

#helpBtn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #334155;
  color: white;
  font-weight: 900;
  cursor: pointer;
  border: none;
}

#info {
  display: flex;
  gap: 14px;
  align-items: center;
  font-weight: bold;
}

button {
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
}

#plantBtn { background: #22c55e; }
#reviveBtn { background: #ef4444; margin-left: 8px; }

/* ===== PANEL ===== */
#panel {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
}

/* ===== RARITY ===== */
.rarity {
  margin-bottom: 10px;
  border-radius: 10px;
  overflow: hidden;
  background: #111827;
}

.rarityHeader {
  padding: 10px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  background: #1f2937;
}

.rarityContent {
  display: none;
  padding: 8px;
}

.rarity.open .rarityContent {
  display: block;
}

.plantBox {
  background: #1f2937;
  margin: 6px 0;
  padding: 8px;
  border-radius: 8px;
  border-left: 4px solid #22c55e;
}

.locked { opacity: 0.35; }

/* ===== RESET ===== */
#resetBtn {
  position: fixed;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: #111827;
  color: white;
  border: 2px solid #374151;
  padding: 12px 18px;
  border-radius: 12px;
  font-weight: 900;
}

/* ===== HELP ===== */
#helpOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#helpBox {
  width: 85%;
  max-width: 600px;
  background: #111827;
  padding: 16px;
  border-radius: 12px;
}

.helpClose {
  margin-top: 10px;
  background: #ef4444;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div id="topbar">

  <div id="titleBox">
    <div id="title">🌱 Plant Simulator</div>
    <button id="helpBtn">?</button>
  </div>

  <div>
    <button id="plantBtn">Pflanzen</button>
    <button id="reviveBtn" style="display:none">Revive</button>
  </div>

  <div id="info">
    <div id="weather">---</div>
    <div id="timer">bereit</div>
  </div>

</div>

<div id="panel"></div>

<button id="resetBtn">🔁 Reset</button>

<!-- HELP -->
<div id="helpOverlay">
  <div id="helpBox">
    <h2>📘 Erklärung</h2>

    <p>🌱 Pflanzen starten Wachstum</p>
    <p>⏳ Timer läuft abhängig von Wetter + Tageszeit</p>
    <p>🌤️ Wetter beeinflusst Geschwindigkeit</p>
    <p>🌙 Nacht = langsamer, ☀️ Tag = schneller</p>
    <p>📦 Seltenheiten sind einklappbar</p>

    <button class="helpClose" onclick="closeHelp()">Schließen</button>
  </div>
</div>

<script>

// ===== WEATHER =====
const WEATHER = [
  {icon:"☀️ Sonne", mult:1.2},
  {icon:"☁️ Wolken", mult:1.0},
  {icon:"🌧️ Regen", mult:0.8}
];

// ===== PLANTS =====
let PLANTS = {
  common: { time:30*60, color:"#22c55e", list:[{name:"Grasling",desc:"Standard Pflanze"},{name:"Löwenzahn",desc:"Kein Löwen Zahn"}]},
  rare: { time:60*60, color:"#3b82f6", list:[{name:"Mondblatt",desc:"Ist nicht rund"},{name:"Sonnenblüter",desc:"Leuchtet auch"}]},
  epic: { time:90*60, color:"#a855f7", list:[{name:"Flammenlilie",desc:"Für Waldbrände verantwortlich"},{name:"Eiswurz",desc:"Kann sich nicht erkälten"}]},
  legendary: { time:120*60, color:"#f59e0b", list:[{name:"Goldorchidee",desc:"1.000.000$ Wert"},{name:"Blauer Panzerblume",desc:"Trifft immer den 1. Platz"}]},
  mythic: { time:150*60, color:"#ef4444", list:[{name:"Kosmosbaum",desc:"Gigantisch"},{name:"Der Lebensbaum",desc:"Sorgt für alles Leben auf der Erde"}]}
};

// ===== STATE =====
let state = JSON.parse(localStorage.getItem("plantState") || "{}");

if (!state.collection) state.collection = {};
if (!state.growth) state.growth = null;
if (!state.openRarity) state.openRarity = { common:true };
if (!state.weather) state.weather = WEATHER[0];

function save(){
  localStorage.setItem("plantState", JSON.stringify(state));
}

// ===== HELP =====
document.getElementById("helpBtn").onclick = () => {
  document.getElementById("helpOverlay").style.display = "flex";
};

function closeHelp(){
  document.getElementById("helpOverlay").style.display = "none";
}

// ===== MULTIPLIER =====
function getMultiplier(){
  const h = new Date().getHours();
  return ((h>=6 && h<18)?2:0.5) * state.weather.mult;
}

// ===== PLANT =====
document.getElementById("plantBtn").onclick = () => {
  if(state.growth) return;

  const keys = Object.keys(PLANTS);
  const r = keys[Math.floor(Math.random()*keys.length)];
  const plant = PLANTS[r].list[0];

  state.growth = {
    name: plant.name,
    desc: plant.desc,
    rarity: r,
    start: Date.now(),
    duration: PLANTS[r].time*1000
  };

  save();
};

// ===== FINISH =====
function finishPlant(){
  const g = state.growth;
  if(!g) return;

  if(!state.collection[g.name]){
    state.collection[g.name] = {count:0, desc:g.desc};
  }

  state.collection[g.name].count++;

  state.growth = null;
  save();
  render();
}

// ===== TIMER =====
function updateTimer(){
  if(!state.growth){
    document.getElementById("timer").innerText = "bereit";
    return;
  }

  const g = state.growth;
  const elapsed = (Date.now()-g.start) * getMultiplier();
  const remaining = Math.max(0, g.duration - elapsed);

  const m = Math.floor(remaining/60000);
  const s = Math.floor((remaining%60000)/1000);

  document.getElementById("timer").innerText =
    `${m}:${s.toString().padStart(2,"0")}`;

  if(remaining<=0) finishPlant();
}

// ===== INFO =====
function updateInfo(){
  const h = new Date().getHours();
  const day = (h>=6 && h<18) ? "☀️ Tag" : "🌙 Nacht";

  document.getElementById("weather").innerText =
    `${day} | ${state.weather.icon}`;
}

// ===== TOGGLE =====
function toggleRarity(r){
  state.openRarity[r] = !state.openRarity[r];
  save();
  render();
}

// ===== RESET =====
document.getElementById("resetBtn").onclick = () => {
  localStorage.clear();
  location.reload();
};

// ===== RENDER =====
function render(){
  let html = "";

  for(let r of Object.keys(PLANTS)){
    const open = state.openRarity[r];

    html += `
      <div class="rarity ${open?"open":""}">
        <div class="rarityHeader" onclick="toggleRarity('${r}')">
          <span>${r.toUpperCase()}</span>
          <span>${open?"▲":"▼"}</span>
        </div>
        <div class="rarityContent">
    `;

    PLANTS[r].list.forEach(p=>{
      const owned = state.collection[p.name];

      html += `
        <div class="plantBox ${owned?"":"locked"}"
        style="border-left:4px solid ${PLANTS[r].color}">
          <b>${p.name}</b><br>
          ${owned ? p.desc : "???"}
        </div>
      `;
    });

    html += `</div></div>`;
  }

  document.getElementById("panel").innerHTML = html;
}

// ===== LOOP =====
setInterval(()=>{
  updateTimer();
  updateInfo();
},200);

render();
updateInfo();

</script>

</body>
</html>
